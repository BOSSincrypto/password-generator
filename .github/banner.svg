<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="250" fill="url(#bg)"/>

  <!-- Decorative wave -->
  <path d="M0 180 Q 300 120 600 160 T 1200 140 V 250 H 0 Z" fill="#10b981" fill-opacity="0.08"/>
  <path d="M0 200 Q 300 150 600 190 T 1200 170 V 250 H 0 Z" fill="#06b6d4" fill-opacity="0.08"/>

  <!-- Lock / shield icon -->
  <g transform="translate(160, 125)" fill="none" stroke="url(#textGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M0 -30 L28 -45 L56 -30 V-5 C56 35 28 55 28 55 C28 55 0 35 0 -5 Z"/>
    <circle cx="28" cy="5" r="8"/>
    <path d="M28 13 V25"/>
  </g>

  <!-- Title -->
  <text x="620" y="120" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">
    Password Generator
  </text>

  <!-- Subtitle -->
  <text x="620" y="175" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="400" fill="#cbd5e1">
    Cryptographically secure passwords &amp; passphrases
  </text>
</svg>
